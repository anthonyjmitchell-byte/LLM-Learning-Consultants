<section id="resources">
  <h2>LLM Resources & Experiments</h2>
  <div id="resource-list" class="grid"></div>
</section>

<script>
  fetch('data/llm-resources.json')
    .then(res => {
      if (!res.ok) {
        throw new Error('Network response was not ok: ' + res.status);
      }
      return res.json();
    })
    .then(resources => {
      const container = document.getElementById('resource-list');
      if (!container) {
        console.error('Container #resource-list not found in DOM');
        return;
      }
      container.innerHTML = ''; // Clear loading/error placeholder if any
      resources.forEach(r => {
        const card = document.createElement('div');
        card.className = 'resource-card';
        card.innerHTML = `
          <h3>${r.title}</h3>
          <p class="meta">${r.type || 'Resource'} • ${r.date}</p>
          <p>${r.description}</p>
          ${r.tags && r.tags.length ? 
            `<p class="tags">${r.tags.map(t => `<span>#${t}</span>`).join(' ')}</p>` : ''}
          <div class="links">
            ${Object.entries(r.links || {}).map(([key, url]) => 
              url ? `<a href="${url}" target="_blank" rel="noopener">${key}</a>` : ''
            ).join(' • ')}
          </div>
        `;
        container.appendChild(card);
      });
    })
    .catch(err => {
      console.error('Failed to load resources:', err);
      const container = document.getElementById('resource-list');
      if (container) {
        container.innerHTML = '<p style="color:#c00; text-align:center;">Error loading data — check browser console for details.</p>';
      }
    });
</script>
